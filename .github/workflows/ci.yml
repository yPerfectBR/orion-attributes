name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: main
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack Orion SDK from server checkout
        run: bash scripts/ci-setup-server-sdk.sh

      - name: Build plugin
        run: dotnet build OrionAttributes.csproj -c Release

      - name: Unit tests
        run: dotnet test tests/Orion.Plugins.Attributes.Tests/Orion.Plugins.Attributes.Tests.csproj -c Release --verbosity minimal

      - name: Smoke boot server with plugin
        env:
          PLUGIN_DEP_DIRS: ""
        run: bash scripts/ci-smoke-server.sh
