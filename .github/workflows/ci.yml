name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: development
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: >
          dotnet build OrionAttributes.csproj -c Release
          -p:OrionServerBERoot=$GITHUB_WORKSPACE/OrionServerBE
          -p:PluginsSiblingRoot=$GITHUB_WORKSPACE
